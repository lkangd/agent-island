name: AgentIsland CI Build

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (signed for local release, unsigned for CI)
        env:
          AGENT_ISLAND_NO_SIGN: "1"
        run: |
          chmod +x scripts/*.sh
          ./scripts/build.sh

      - name: Package App and DMG
        run: |
          set -euo pipefail
          VERSION_ID="${GITHUB_REF_NAME:-${GITHUB_SHA}}"
          ARTIFACT_DIR="build/artifacts"
          APP_PATH="build/export/Agent Island.app"
          DMG_PATH="$ARTIFACT_DIR/AgentIsland-$VERSION_ID.dmg"
          ZIP_PATH="$ARTIFACT_DIR/AgentIsland-$VERSION_ID-unsigned.zip"
          DMG_STAGING_DIR="build/dmg-staging"

          mkdir -p "$ARTIFACT_DIR"

          if [ ! -d "$APP_PATH" ]; then
            echo "App not found: $APP_PATH"
            exit 1
          fi

          rm -rf "$DMG_STAGING_DIR" "$DMG_PATH"
          mkdir -p "$DMG_STAGING_DIR"
          cp -R "$APP_PATH" "$DMG_STAGING_DIR/"
          ln -s /Applications "$DMG_STAGING_DIR/Applications"
          cat > "$DMG_STAGING_DIR/README.txt" <<'EOF'
          AgentIsland Installation Notes

          If macOS says the app cannot be opened, run:

          xattr -cr "/Applications/Agent Island.app"
          EOF

          hdiutil create -volname "AgentIsland" \
            -srcfolder "$DMG_STAGING_DIR" \
            -ov -format UDZO \
            "$DMG_PATH"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          ls -lah "$ARTIFACT_DIR"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentisland-macos-artifacts
          path: |
            build/artifacts/AgentIsland-*.dmg
            build/artifacts/AgentIsland-*.zip
            build/export/Agent Island.app

  release:
    runs-on: macos-15
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: agentisland-macos-artifacts
          path: build/artifacts

      - name: Locate release assets
        id: assets
        run: |
          set -euo pipefail
          echo "Downloaded artifacts:"
          find build/artifacts -maxdepth 4 -type f | sort

          DMG_PATH="$(find build/artifacts -type f -name "AgentIsland-${GITHUB_REF_NAME}.dmg" | head -n 1)"
          ZIP_PATH="$(find build/artifacts -type f -name "AgentIsland-${GITHUB_REF_NAME}-unsigned.zip" | head -n 1)"

          if [ -z "$DMG_PATH" ]; then
            echo "Unable to locate DMG for tag ${GITHUB_REF_NAME}"
            exit 1
          fi

          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          if [ -n "$ZIP_PATH" ]; then
            echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project AgentIsland.xcodeproj \
            -scheme AgentIsland

      - name: Restore Sparkle private key
        env:
          SPARKLE_PRIVATE_KEY_B64: ${{ secrets.SPARKLE_PRIVATE_KEY_B64 }}
        run: |
          set -e
          if [ -z "$SPARKLE_PRIVATE_KEY_B64" ]; then
            echo "Missing SPARKLE_PRIVATE_KEY_B64 secret"
            exit 1
          fi
          mkdir -p .sparkle-keys
          echo "$SPARKLE_PRIVATE_KEY_B64" | base64 --decode > .sparkle-keys/eddsa_private_key
          chmod 600 .sparkle-keys/eddsa_private_key

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AgentIsland ${{ github.ref_name }}
          files: |
            ${{ steps.assets.outputs.dmg_path }}

      - name: Generate Sparkle appcast for GitHub Pages
        env:
          VERSION_TAG: ${{ github.ref_name }}
          DMG_PATH: ${{ steps.assets.outputs.dmg_path }}
          OUTPUT_DIR: build/pages
          SPARKLE_PRIVATE_KEY_FILE: .sparkle-keys/eddsa_private_key
          GITHUB_REPO: ${{ github.repository }}
        run: |
          chmod +x scripts/prepare-github-appcast.sh
          ./scripts/prepare-github-appcast.sh

      - name: Upload appcast artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages

  deploy-pages:
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Deploy appcast to GitHub Pages
        uses: actions/deploy-pages@v4
