name: AgentIsland CI Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build (signed for local release, unsigned for CI)
        env:
          AGENT_ISLAND_NO_SIGN: "1"
        run: |
          chmod +x scripts/*.sh
          ./scripts/build.sh

      - name: Package App and DMG
        run: |
          set -e
          VERSION_ID="${GITHUB_REF_NAME:-${GITHUB_SHA}}"
          ARTIFACT_DIR="build/artifacts"
          APP_PATH="build/export/Agent Island.app"
          DMG_PATH="$ARTIFACT_DIR/AgentIsland-$VERSION_ID.dmg"
          ZIP_PATH="$ARTIFACT_DIR/AgentIsland-$VERSION_ID-unsigned.zip"

          mkdir -p "$ARTIFACT_DIR"

          if [ ! -d "$APP_PATH" ]; then
            echo "App not found: $APP_PATH"
            exit 1
          fi

          hdiutil create -volname "AgentIsland" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_PATH"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

          ls -lah "$ARTIFACT_DIR"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentisland-macos-artifacts
          path: |
            build/artifacts/AgentIsland-*.dmg
            build/artifacts/AgentIsland-*.zip
            build/export/Agent Island.app

  release:
    runs-on: macos-14
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: agentisland-macos-artifacts
          path: build/artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AgentIsland ${{ github.ref_name }}
          files: |
            build/artifacts/AgentIsland-${{ github.ref_name }}.dmg
            build/artifacts/AgentIsland-${{ github.ref_name }}-unsigned.zip
